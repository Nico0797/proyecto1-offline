version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuaderno-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cuaderno
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=dev-jwt-secret-change-in-production
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./exports:/app/exports
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cuaderno-network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: cuaderno-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cuaderno
    volumes:
      - cuaderno-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cuaderno-network

  # Nginx (optional, for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: cuaderno-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - cuaderno-network

volumes:
  cuaderno-db-data:
    driver: local

networks:
  cuaderno-network:
    driver: bridge
