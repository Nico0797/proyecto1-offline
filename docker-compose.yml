version: '3.8'

services:
  # Full Stack App (Backend serving React Build)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encaja-app
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cuaderno
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=dev-jwt-secret-change-in-production
      - APP_STATIC_DIR=/app/backend/static_dist
    volumes:
      # Mount exports/backups for persistence
      - ./exports:/app/exports
      - ./backups:/app/backups
      # Do NOT mount ./backend code to avoid hiding static_dist
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cuaderno-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: encaja-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cuaderno
    volumes:
      - cuaderno-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cuaderno-network

volumes:
  cuaderno-db-data:
    driver: local

networks:
  cuaderno-network:
    driver: bridge
