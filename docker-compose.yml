version: '3.8'

services:
  # Full Stack App (Backend serving React Build)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encaja-app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - FLASK_ENV=development
      - DEBUG=false
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cuaderno
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=local-dev-secret-key-not-for-production-12345
      - JWT_SECRET_KEY=local-dev-jwt-secret-key-not-for-production-12345
      - CLIENT_URL=http://localhost:5173
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000
      - APP_STATIC_DIR=/app/backend/static_dist
      - ALLOW_SQLITE_FALLBACK=false
      - ALLOW_RUNTIME_SCHEMA_MUTATIONS=false
      - ALLOW_STARTUP_DATA_BOOTSTRAP=false
      - EXPOSE_ERROR_DETAILS=true
      - GUNICORN_WORKERS=2
      - GUNICORN_THREADS=2
    volumes:
      # Mount exports/backups for persistence
      - ./exports:/app/exports
      - ./backups:/app/backups
      # Do NOT mount ./backend code to avoid hiding static_dist
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - cuaderno-network

  summary-refresh-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encaja-summary-refresh-worker
    command: ["python", "-m", "backend.workers.summary_refresh_worker"]
    environment:
      - APP_ENV=development
      - FLASK_ENV=development
      - DEBUG=false
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cuaderno
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=local-dev-secret-key-not-for-production-12345
      - JWT_SECRET_KEY=local-dev-jwt-secret-key-not-for-production-12345
      - CLIENT_URL=http://localhost:5173
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000
      - APP_STATIC_DIR=/app/backend/static_dist
      - ALLOW_SQLITE_FALLBACK=false
      - ALLOW_RUNTIME_SCHEMA_MUTATIONS=false
      - ALLOW_STARTUP_DATA_BOOTSTRAP=false
      - EXPOSE_ERROR_DETAILS=true
    volumes:
      - ./exports:/app/exports
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - cuaderno-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: encaja-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cuaderno
    volumes:
      - cuaderno-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cuaderno-network

  redis:
    image: redis:7-alpine
    container_name: encaja-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    networks:
      - cuaderno-network

volumes:
  cuaderno-db-data:
    driver: local

networks:
  cuaderno-network:
    driver: bridge
