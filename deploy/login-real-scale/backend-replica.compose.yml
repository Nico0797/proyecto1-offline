services:
  app:
    image: ${APP_IMAGE}
    container_name: ${CONTAINER_NAME:-encaja-login-replica}
    ports:
      - "8000:8000"
    env_file:
      - ./backend-replica.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
