name: Generate Keystore (One Time)

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Password for the keystore (min 6 chars)'
        required: true
        default: 'android'
      alias:
        description: 'Alias for the key'
        required: true
        default: 'upload'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
          -keystore my-upload-key.keystore \
          -alias ${{ inputs.alias }} \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass ${{ inputs.password }} \
          -keypass ${{ inputs.password }} \
          -dname "CN=EnCaja Admin, OU=IT, O=EnCaja, L=Bogota, S=Bogota, C=CO"

      - name: Encode Keystore to Base64 (For GitHub Secrets)
        run: |
          base64 -w 0 my-upload-key.keystore > keystore_base64.txt
          echo "::notice::Keystore generated! Download the artifact to get the file and the base64 string."

      - name: Upload Keystore Files
        uses: actions/upload-artifact@v3
        with:
          name: keystore-files
          path: |
            my-upload-key.keystore
            keystore_base64.txt
