name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}/licenses" || true
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "${ANDROID_SDK_ROOT}/licenses/android-sdk-license"

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add Android Platform (if not exists)
        run: |
          if [ ! -d "android" ]; then
            echo "Directory 'android' not found. Adding Android platform..."
            npx cap add android
          else
            echo "Directory 'android' found."
          fi

      - name: List Android directory contents
        run: ls -la ./android

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: List available Gradle tasks
        working-directory: ./android
        run: ./gradlew tasks --all

      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
          
      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
