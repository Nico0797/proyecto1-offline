name: Build Android APK & AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Android SDK (command-line tools)
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          VERS="11076708 10406996 9477386"
          for v in $VERS; do
            if curl -sLf "https://dl.google.com/android/repository/commandlinetools-linux-${v}_latest.zip" -o cmdlinetools.zip; then
              break
            fi
          done
          unzip -q cmdlinetools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -f cmdlinetools.zip
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Accept Android licenses and install platform
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android (Debug APK)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --no-configuration-cache --stacktrace 2>&1 | tee gradle-debug.log
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "::error::Debug APK not found. Últimas 400 líneas del log:"
            tail -400 gradle-debug.log
            exit 1
          fi

      - name: Build Android (Release AAB)
        working-directory: ./android
        run: |
          ./gradlew bundleRelease --no-daemon --no-configuration-cache --stacktrace 2>&1 | tee gradle-release.log
          if [ ! -f app/build/outputs/bundle/release/app-release.aab ]; then
            echo "::error::Release AAB not found. Últimas 400 líneas del log:"
            tail -400 gradle-release.log
            exit 1
          fi

      - name: Upload AAB (Release)
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
