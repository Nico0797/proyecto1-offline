# Alternativa: usa la acción android-actions/setup-android (menos control del SDK).
# Activa este workflow desde "Run workflow" si el principal falla en "Install Android SDK".
name: Build Android (alternativo)

on:
  workflow_dispatch:

env:
  CI: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform and build-tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
      - name: Clean unnecessary files
        run: |
          rm -f frontend/static/android/encaja.apk
          rm -rf frontend/static/screenshots
      - run: npx cap sync android

      - name: Build APK y AAB
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug bundleRelease --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
