<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Cuaderno</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b1220;
            --bg-sidebar: #0f172a;
            --card-bg: rgba(255,255,255,0.06);
            --card-border: rgba(255,255,255,0.12);
            --text-primary: rgba(255,255,255,0.92);
            --text-muted: rgba(255,255,255,0.70);
            --accent-blue: #22C55E;
            --accent-green: #22C55E;
            --accent-yellow: #F59E0B;
            --accent-red: #EF4444;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--card-border);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .sidebar-logo-icon {
            width: auto;
            height: auto;
            background: transparent;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .sidebar-logo-text {
            font-weight: 700;
            font-size: 18px;
        }
        
        .sidebar-search {
            padding: 16px 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 10px 14px;
            padding-left: 36px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        
        .search-wrapper {
            position: relative;
        }
        
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
        }
        
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .nav-section {
            margin-bottom: 16px;
        }
        
        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            padding: 8px 12px;
            letter-spacing: 0.5px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .nav-item.active {
            background: rgba(42,109,253,0.2);
            color: #60a5fa;
        }
        
        .nav-item i {
            font-size: 18px;
        }
        
        /* Main content */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 40;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #1D4ED8);
            color: white;
        }
        
        .btn-primary:hover {
            box-shadow: 0 4px 14px rgba(42,109,253,0.35);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        
        /* Content area */
        .content {
            padding: 24px;
        }
        
        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }
        
        .stat-change.positive { color: var(--accent-green); }
        .stat-change.negative { color: var(--accent-red); }
        
        /* Tables */
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        
        th {
            font-size: 12px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
        }
        
        td {
            font-size: 14px;
        }
        
        tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        
        /* Forms */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal {
            background: #1e293b;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success {
            background: rgba(34,197,94,0.2);
            color: #4ade80;
        }
        
        .badge-warning {
            background: rgba(245,158,11,0.2);
            color: #fbbf24;
        }
        
        .badge-danger {
            background: rgba(239,68,68,0.2);
            color: #f87171;
        }
        
        .badge-info {
            background: rgba(42,109,253,0.2);
            color: #60a5fa;
        }
        
        /* Hidden */
        .hidden { display: none !important; }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: rgba(255,255,255,0.6);
        }
        
        /* User menu */
        .user-menu {
            position: relative;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), #1D4ED8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
        }
        
        .toast {
            background: #1e293b;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 40;
            display: none;
        }
        .sidebar-overlay.show { display: block; }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.2s ease-in-out;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .content {
                padding: 16px;
            }
            .card {
                padding: 16px;
            }
        .encaja-gradient {
            background: linear-gradient(135deg, #ef4444, #f87171);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.5));
            backdrop-filter: blur(8px);
            border-radius: 16px;
        }
            .header-title {
                font-size: 18px;
            }
            .header-actions {
                gap: 8px;
            }
        }
    </style>
</head>
<body class="bg-[#0b1220]">

        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="mx-auto mb-4 w-64 h-64 flex items-center justify-center">
                    <img src="/assets/logo.png" alt="Logo" class="w-64 h-64 object-cover scale-150 transform-gpu">
                </div>
                <p class="text-white/60 mt-2">Panel de Administración</p>

    <!-- Main App -->
    <div id="main-app" class="hidden">
        <!-- Sidebar -->
        <aside class="sidebar">

                <div class="sidebar-logo-icon"><img src="/assets/logo.png" alt="Logo" class="w-32 h-32 object-cover scale-150 transform-gpu"></div>
            </div>
            <button class="btn btn-secondary md:hidden" style="margin-left:auto" onclick="app.toggleSidebar()">

            <nav class="sidebar-nav">

                </div>
                
                <div class="nav-section">

        <!-- Main Content -->

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // Panel Application
        const app = {
            user: null,
            token: null,
            currentPage: 'summary',
            businesses: [],
            business: null,
            sidebarOpen: false,
            
            // Initialize
            async init() {
                this.token = localStorage.getItem('token');
                if (this.token) {
                    await this.checkAuth();
                }
            },
            
            // Auth
            async checkAuth() {
                try {
                    const res = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        this.user = data.user;
                        this.showApp();
                    } else {
                        this.showLogin();
                    }
                } catch (e) {
                    this.showLogin();
                }
            },
            
            async login() {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        this.token = data.access_token;
                        localStorage.setItem('token', this.token);
                        await this.checkAuth();
                    } else {
                        const data = await res.json();
                        this.showToast(data.error || 'Error al iniciar sesión', 'error');
                    }
                } catch (e) {
                    this.showToast('Error de conexión', 'error');
                }
            },
            
            logout() {
                localStorage.removeItem('token');
                this.token = null;
                this.user = null;
                this.showLogin();
            },
            
            showLogin() {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
                const emailInput = document.getElementById('login-email');
                const passwordInput = document.getElementById('login-password');
                if (emailInput) emailInput.value = '';
                if (passwordInput) passwordInput.value = '';
            },
            
            showApp() {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('header-user-name').textContent = this.user.name;
                document.getElementById('header-user-email').textContent = this.user.email;
                document.getElementById('user-initials').textContent = this.user.name.charAt(0).toUpperCase();
                
                this.navigate('summary');
            },
            
            toggleSidebar() {
                const sidebar = document.querySelector('.sidebar');
                if (!sidebar) return;
                this.sidebarOpen = !this.sidebarOpen;
                if (this.sidebarOpen) {
                    sidebar.classList.add('open');
                } else {
                    sidebar.classList.remove('open');
                }
                const overlay = document.getElementById('sidebar-overlay');
                if (overlay) {
                    if (this.sidebarOpen) {
                        overlay.classList.add('show');
                    } else {
                        overlay.classList.remove('show');
                    }
                }
            },
            
            // Navigation
            navigate(page) {
                this.currentPage = page;
                
                // Update active nav item
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.page === page) {
                        item.classList.add('active');
                    }
                });
                
                // Update page title
                const titles = {
                    'summary': 'Resumen',
                    'analytics': 'Analíticas',
                    'users': 'Usuarios',
                    'customers': 'Clientes',
                    'products': 'Productos',
                    'businesses': 'Negocios',
                    'data': 'Datos',
                    'roles': 'Roles',
                    'permissions': 'Permisos',
                    'security': 'Seguridad',
                    'audit': 'Auditoría',
                    'domains': 'Dominios',
                    'integrations': 'Integraciones',
                    'settings': 'Ajustes'
                };
                document.getElementById('page-title').textContent = titles[page] || page;
                
                // Load content
                this.loadPage(page);
            },
            
            async loadPage(page) {
                const content = document.getElementById('content');
                content.innerHTML = '<div class="loading">Cargando...</div>';
                
                switch(page) {
                    case 'summary':
                        await this.loadSummary();
                        break;
                    case 'users':
                        await this.loadUsers();
                        break;
                    case 'customers':
                        await this.loadCustomers();
                        break;
                    case 'products':
                        await this.loadProducts();
                        break;
                    case 'analytics':
                        await this.loadAnalytics();
                        break;
                    case 'security':
                        await this.loadSecurity();
                        break;
                    case 'domains':
                        await this.loadDomains();
                        break;
                    case 'integrations':
                        await this.loadIntegrations();
                        break;
                    case 'businesses':
                        await this.loadBusinesses();
                        break;

            async configureIntegration(integrationId) {
                // Show configuration modal based on integration type
                const configs = {
                    'stripe': {
                        name: 'Stripe',
                        fields: [
                            { id: 'stripe_api_key', label: 'API Key', type: 'password', placeholder: 'sk_live_...' },
                            { id: 'stripe_webhook_secret', label: 'Webhook Secret', type: 'password', placeholder: 'whsec_...' }
                        ]
                    },
                    'paypal': {
                        name: 'PayPal',
                        fields: [
                            { id: 'paypal_client_id', label: 'Client ID', type: 'text', placeholder: 'Client ID' },
                            { id: 'paypal_secret', label: 'Secret', type: 'password', placeholder: 'Secret' }
                        ]
                    },
                    'email': {
                        name: 'Email (SMTP)',
                        fields: [
                            { id: 'smtp_host', label: 'SMTP Host', type: 'text', placeholder: 'smtp.example.com' },
                            { id: 'smtp_port', label: 'Puerto', type: 'number', placeholder: '587' },
                            { id: 'smtp_user', label: 'Usuario', type: 'text', placeholder: 'user@example.com' },
                            { id: 'smtp_password', label: 'Contraseña', type: 'password', placeholder: '••••••••' },
                            { id: 'smtp_from', label: 'From Email', type: 'email', placeholder: 'noreply@example.com' }
                        ]
                    },
                    'webhooks': {
                        name: 'Webhooks',
                        fields: [
                            { id: 'webhook_url', label: 'URL del Webhook', type: 'url', placeholder: 'https://...' },
                            { id: 'webhook_secret', label: 'Secreto', type: 'password', placeholder: '••••••••' }
                        ]
                    }
                };
                
                const config = configs[integrationId];
                if (!config) {
                    this.showToast('Integración no configurada', 'info');
                    return;
                }
                
                const modal = document.createElement('div');
                modal.id = 'config-integration-modal';
                modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
                
                let fieldsHtml = '';
                config.fields.forEach(field => {
                    fieldsHtml += `
                        <div class="form-group">
                            <label class="form-label">${field.label}</label>
                            <input type="${field.type}" id="${field.id}" class="form-input" placeholder="${field.placeholder}">
                        </div>
                    `;
                });
                
                modal.innerHTML = `
                    <div class="bg-slate-800 rounded-xl p-6 w-full max-w-md border border-white/10">
                        <h3 class="text-xl font-semibold mb-4">Configurar ${config.name}</h3>
                        ${fieldsHtml}
                        <div class="flex gap-2 justify-end mt-4">
                            <button class="btn-secondary" onclick="document.getElementById('config-integration-modal').remove()">Cancelar</button>
                            <button class="btn-primary" onclick="app.saveIntegrationConfig('${integrationId}')">Guardar</button>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Load current values
                this.loadIntegrationConfig(integrationId);
            },
            
            async loadIntegrationConfig(integrationId) {
                try {
                    const res = await fetch('/api/admin/integrations', {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const integration = data.integrations.find(i => i.id === integrationId);
                        if (integration && integration.config) {
                            Object.entries(integration.config).forEach(([key, value]) => {
                                const input = document.getElementById(key);
                                if (input) input.value = value;
                            });
                        }
                    }
                } catch (e) {
                    console.error('Error loading config:', e);
                }
            },
            
            async saveIntegrationConfig(integrationId) {
                const configs = {
                    'stripe': ['stripe_api_key', 'stripe_webhook_secret'],
                    'paypal': ['paypal_client_id', 'paypal_secret'],
                    'email': ['smtp_host', 'smtp_port', 'smtp_user', 'smtp_password', 'smtp_from'],
                    'webhooks': ['webhook_url', 'webhook_secret']
                };
                
                const fields = configs[integrationId] || [];
                const config = {};
                
                fields.forEach(fieldId => {
                    const input = document.getElementById(fieldId);
                    if (input && input.value) {
                        config[fieldId] = input.value;
                    }
                });
                
                try {
                    const res = await fetch(`/api/admin/integrations/${integrationId}`, {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ config, enabled: true })
                    });
                    
                    if (res.ok) {
                        document.getElementById('config-integration-modal').remove();
                        this.showToast('Configuración guardada', 'success');
                        this.loadIntegrationsData();
                    } else {
                        const data = await res.json();
                        this.showToast(data.error || 'Error al guardar', 'error');
                    }
                } catch (e) {
                    this.showToast('Error de conexión', 'error');
                }
            },

            async editUser(userId) {
                try {
                    // Get user details
                    const userRes = await fetch(`/api/admin/users/${userId}`, {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    
                    // Get all available roles
                    const rolesRes = await fetch('/api/admin/roles', {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    
                    if (!userRes.ok || !rolesRes.ok) {
                        this.showToast('Error al cargar datos del usuario', 'error');
                        return;
                    }
                    
                    const userData = await userRes.json();
                    const rolesData = await rolesRes.json();
                    const user = userData.user;
                    const roles = rolesData.roles || [];
                    
                    // Get current user roles
                    const userRolesRes = await fetch(`/api/admin/users/${userId}/roles`, {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    let currentRoles = [];
                    if (userRolesRes.ok) {
                        const userRolesData = await userRolesRes.json();
                        currentRoles = userRolesData.roles || [];
                    }
                    
                    const modal = document.createElement('div');
                    modal.id = 'edit-user-modal';
                    modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
                    
                    const rolesOptions = roles.map(role => 
                        `<option value="${role.id}" ${currentRoles.includes(role.id) ? 'selected' : ''}>${role.name}</option>`
                    ).join('');
                    
                    modal.innerHTML = `
                        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-lg border border-white/10">

                            </div>

                                <select id="edit-user-active" class="form-input">

                            </div>

                                <button class="btn-secondary" onclick="document.getElementById('edit-user-modal').remove()">Cancelar</button>

            async saveUser(userId) {
                const name = document.getElementById('edit-user-name').value;
                const email = document.getElementById('edit-user-email').value;
                const plan = document.getElementById('edit-user-plan').value;
                const isActive = document.getElementById('edit-user-active').value === 'true';
                const selectedRoles = Array.from(document.getElementById('edit-user-roles').selectedOptions).map(opt => parseInt(opt.value));
                
                try {
                    // Update user
                    const updateRes = await fetch(`/api/admin/users/${userId}`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name, email, plan, is_active: isActive })
                    });
                    
                    if (!updateRes.ok) {
                        const err = await updateRes.json();
                        this.showToast(err.error || 'Error al actualizar usuario', 'error');
                        return;
                    }
                    
                    // Update roles
                    const rolesRes = await fetch(`/api/admin/users/${userId}/roles`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ roles: selectedRoles })
                    });
                    
                    if (!rolesRes.ok) {
                        const err = await rolesRes.json();
                        this.showToast(err.error || 'Error al actualizar roles', 'error');
                        return;
                    }
                    
                    document.getElementById('edit-user-modal').remove();
                    this.showToast('Usuario actualizado correctamente', 'success');
                    this.loadUsersTable();
                    
                } catch (e) {
                    console.error(e);
                    this.showToast('Error al guardar usuario', 'error');
                }
            },

                        const blob = await res.blob();

                        a.download = `backup_${new Date().toISOString().split('T')[0]}.${format}`;

                    this.showToast('Error de conexión', 'error');
                }
            },
            
            editRole(roleId) {
                // Show edit modal with role data and permissions
                this.showEditRoleModal(roleId);
            },
            
            async showEditRoleModal(roleId) {
                try {
                    // Get role details and permissions
                    const roleRes = await fetch(`/api/admin/roles/${roleId}`, {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    const permsRes = await fetch('/api/admin/permissions', {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    
                    if (!roleRes.ok || !permsRes.ok) {
                        this.showToast('Error al cargar datos', 'error');
                        return;
                    }
                    
                    const roleData = await roleRes.json();
                    const allPerms = await permsRes.json();
                    const role = roleData.role;
                    const rolePerms = role.permissions || [];
                    const rolePermNames = rolePerms.map(p => typeof p === 'string' ? p : p.name);
                    
                    // Group permissions by category
                    const groupedPerms = {};
                    allPerms.permissions.forEach(p => {
                        const cat = p.category || 'Other';
                        if (!groupedPerms[cat]) groupedPerms[cat] = [];
                        groupedPerms[cat].push(p);
                    });
                    
                    const modal = document.createElement('div');
                    modal.id = 'edit-role-modal';
                    modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
                    
                    let permissionsHtml = '';
                    for (const [category, perms] of Object.entries(groupedPerms)) {
                        permissionsHtml += `
                            <div class="mb-4">
                                <h4 class="text-sm font-semibold text-white/80 mb-2">${category}</h4>
                                <div class="grid grid-cols-2 gap-2">
                                    ${perms.map(p => `
                                        <label class="flex items-center gap-2 text-sm">
                                            <input type="checkbox" name="permission" value="${p.name}" 
                                                ${rolePermNames.includes(p.name) ? 'checked' : ''}
                                                class="rounded bg-slate-700 border-slate-600">
                                            <span class="text-white/70">${p.name}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    modal.innerHTML = `
                        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-lg border border-white/10 max-h-[80vh] overflow-y-auto">
                            <h3 class="text-xl font-semibold mb-4">Editar Rol: ${role.name}</h3>
                            
                            <div class="form-group mb-4">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="edit-role-name" class="form-input" value="${role.name}" ${role.is_system ? 'disabled' : ''}>
                            </div>
                            
                            <div class="form-group mb-4">
                                <label class="form-label">Descripción</label>
                                <input type="text" id="edit-role-description" class="form-input" value="${role.description || ''}">
                            </div>
                            
                            <div class="mb-4">
                                <h4 class="form-label mb-2">Permisos</h4>
                                ${permissionsHtml}
                            </div>
                            
                            <div class="flex gap-2 justify-end">
                                <button class="btn-secondary" onclick="document.getElementById('edit-role-modal').remove()">Cancelar</button>
                                <button class="btn-primary" onclick="app.saveRolePermissions(${roleId})">Guardar</button>
                            </div>
                        </div>
                    `;
                    
                    document.body.appendChild(modal);
                    
                } catch (e) {
                    console.error(e);
                    this.showToast('Error al cargar rol', 'error');
                }
            },
            
            async saveRolePermissions(roleId) {
                const name = document.getElementById('edit-role-name').value;
                const description = document.getElementById('edit-role-description').value;
                const selectedPerms = Array.from(document.querySelectorAll('input[name="permission"]:checked')).map(cb => cb.value);
                
                try {
                    // Update role details
                    const updateRes = await fetch(`/api/admin/roles/${roleId}`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name, description })
                    });
                    
                    if (!updateRes.ok) {
                        const err = await updateRes.json();
                        this.showToast(err.error || 'Error al actualizar rol', 'error');
                        return;
                    }
                    
                    // Update permissions - now uses bulk endpoint
                    const permsRes = await fetch(`/api/admin/roles/${roleId}/permissions`, {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ permissions: selectedPerms })
                    });
                    
                    if (!permsRes.ok) {
                        const err = await permsRes.json();
                        this.showToast(err.error || 'Error al actualizar permisos', 'error');
                        return;
                    }
                    
                    this.showToast('Rol actualizado correctamente', 'success');
                    this.loadRoles();
                    document.getElementById('edit-role-modal').remove();
                    
                    if (permsRes.ok) {
                        document.getElementById('edit-role-modal').remove();
                        this.showToast('Rol actualizado correctamente', 'success');
                        this.loadRoles();
                    } else {
                        const err = await permsRes.json();
                        this.showToast(err.error || 'Error al actualizar permisos', 'error');
                    }
                    
                } catch (e) {
                    this.showToast('Error de conexión', 'error');
                }
            },
            
            async deleteRole(roleId) {
                if (!confirm('¿Estás seguro de eliminar este rol?')) return;
                
                try {
                    const res = await fetch(`/api/admin/roles/${roleId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    
                    if (res.ok) {
                        this.showToast('Rol eliminado', 'success');
                        this.loadRoles();
                    } else {
                        const data = await res.json();
                        this.showToast(data.error || 'Error al eliminar', 'error');
                    }
                } catch (e) {
                    this.showToast('Error de conexión', 'error');
                }
            },
            
            // Settings Page
            async loadSettings() {
                const content = document.getElementById('content');
                content.innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Configuración del Sistema</h3>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Nombre de la Aplicación</label>
                            <input type="text" id="settings-app-name" class="form-input" value="Cuaderno">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Modo de Acceso</label>
                            <select id="settings-require-login" class="form-input">
                                <option value="true">Requiere Login</option>
                                <option value="false">Público</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="app.saveSettings()">Guardar Cambios</button>
                    </div>
                `;
                
                // Load current settings
                this.loadCurrentSettings();
            },
            
            async loadCurrentSettings() {
                try {
                    const res = await fetch('/api/settings', {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.settings) {
                            document.getElementById('settings-app-name').value = data.settings.app_name || 'Cuaderno';
                            document.getElementById('settings-require-login').value = String(data.settings.require_login !== false);
                        }
                    }
                } catch (e) {
                    console.error('Error loading settings:', e);
                }
            },
            
            async saveSettings() {
                const app_name = document.getElementById('settings-app-name').value;
                const require_login = document.getElementById('settings-require-login').value === 'true';
                
                try {
                    const res = await fetch('/api/settings', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.token}`
                        },
                        body: JSON.stringify({ app_name, require_login })
                    });
                    
                    if (res.ok) {
                        this.showToast('Configuración guardada', 'success');
                    } else {
                        const data = await res.json();
                        this.showToast(data.error || 'Error al guardar', 'error');
                    }
                } catch (e) {
                    this.showToast('Error de conexión', 'error');
                }
            },
            
            // Utilities
            toggleUserMenu() {
                const dropdown = document.getElementById('user-dropdown');
                dropdown.classList.toggle('hidden');
            },
            
            copyAppLink() {
                const url = window.location.origin + '/app';
                navigator.clipboard.writeText(url).then(() => {
                    this.showToast('Enlace copiado al portapapeles', 'success');
                });
            },
            
            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },
            
            formatNumber(num) {
                return new Intl.NumberFormat('es-CO').format(num);
            },
            
            async api(endpoint, options = {}) {
                const headers = {
                    'Content-Type': 'application/json',
                    ...(this.token ? { 'Authorization': `Bearer ${this.token}` } : {}),
                    ...options.headers
                };
                
                const res = await fetch(endpoint, { ...options, headers });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    if (res.status === 403 && data && data.upgrade_url) {
                        alert((data.error || 'Función disponible solo en Pro') + '\n\nPuedes actualizar tu plan desde la app.');
                        window.location.href = '/app';
                        throw new Error(data.error || 'Acceso restringido');
                    }
                    throw new Error(data.error || 'API Error');
                }
                return data;
            }
        };
        
        // Close user dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('user-dropdown');
            const avatar = document.getElementById('user-avatar');
            if (!dropdown.contains(e.target) && !avatar.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
        
        // Initialize
        app.init();
    </script>
</body>
</html>
